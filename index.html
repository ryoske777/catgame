<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>고양이 집사 테스트 (Hard) 🐾</title>
  <style>
    :root {
      --bg-color: #fff9eb;
      --accent-color: #ff6b6b;
      --box-bg: rgba(255, 255, 255, 0.96);
      --line: #ffd56a;
      --text: #444;
    }

    * { box-sizing: border-box; }

    body {
      text-align: center;
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
      background-color: var(--bg-color);
      margin: 0;
      padding: 0;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: none;
    }

    #game-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: none;
    }

    #cat {
      position: absolute;
      width: 120px;
      height: 120px;
      font-size: 90px;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: none;
      z-index: 10;
      transition: transform 0.08s ease;
      transform-origin: center center;
    }

    #cat:active {
      transform: scale(0.84);
    }

    #ui-layer {
      position: fixed;
      top: 20px;
      width: 100%;
      pointer-events: none;
      display: flex;
      justify-content: center;
      gap: 16px;
      z-index: 100;
      padding: 0 12px;
      flex-wrap: wrap;
    }

    .info-box {
      background: var(--box-bg);
      padding: 10px 18px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      font-size: 20px;
      font-weight: bold;
      color: var(--text);
      border: 2px solid rgba(255, 213, 106, 0.4);
    }

    #guide-modal {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--box-bg);
      padding: 24px;
      border-radius: 25px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
      z-index: 1000;
      width: min(92vw, 380px);
      border: 3px solid #ffcc00;
      text-align: left;
      max-height: 88vh;
      overflow-y: auto;
    }

    #guide-modal h2 {
      margin: 0 0 14px;
      color: #d35400;
      text-align: center;
      font-size: 1.5rem;
    }

    #guide-modal ul {
      text-align: left;
      padding-left: 20px;
      color: #555;
      line-height: 1.7;
      margin: 12px 0 0;
    }

    #guide-modal li {
      margin-bottom: 8px;
    }

    .field-label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      color: #666;
      margin-bottom: 8px;
    }

    #player-name {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 2px solid var(--line);
      font-size: 16px;
      outline: none;
      margin-bottom: 8px;
    }

    #player-name:focus {
      border-color: #ffb300;
      box-shadow: 0 0 0 4px rgba(255, 204, 0, 0.18);
    }

    #result-text {
      margin: 10px 0 2px;
      font-size: 16px;
      font-weight: 700;
      color: #c75d00;
      text-align: center;
      min-height: 24px;
    }

    #ranking-box {
      display: none;
      margin-top: 14px;
      background: #fffdf6;
      padding: 14px;
      border-radius: 16px;
      border: 2px solid #ffe08a;
    }

    #ranking-title {
      font-weight: 800;
      color: #d35400;
      margin-bottom: 10px;
      text-align: center;
    }

    #ranking-list {
      margin: 0;
      padding-left: 22px;
      color: #444;
      line-height: 1.7;
    }

    #ranking-list li {
      margin-bottom: 4px;
      word-break: break-all;
    }

    .ranking-note {
      margin-top: 10px;
      font-size: 12px;
      color: #888;
      text-align: center;
    }

    .message {
      position: absolute;
      color: var(--accent-color);
      font-weight: bold;
      font-size: 1.2rem;
      pointer-events: none;
      animation: fadeUp 0.8s ease-out forwards;
      z-index: 20;
      text-shadow: 0 2px 4px rgba(255,255,255,0.7);
    }

    @keyframes fadeUp {
      0% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(-60px); }
    }

    #start-btn {
      width: 100%;
      padding: 15px;
      font-size: 1.15rem;
      background: #ffcc00;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      margin-top: 18px;
      font-weight: 800;
      transition: 0.2s;
      color: #5b4100;
    }

    #start-btn:hover {
      background: #ffb300;
    }

    #fake-cursor {
      position: fixed;
      left: 0;
      top: 0;
      width: 52px;
      height: 52px;
      pointer-events: none;
      z-index: 5000;
      transform: translate(-50%, -50%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      transition: transform 0.06s ease, filter 0.08s ease;
      filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.15));
    }

    #fake-cursor.grab {
      transform: translate(-50%, -50%) scale(0.85);
    }

    @media (max-width: 540px) {
      #cat {
        width: 100px;
        height: 100px;
        font-size: 78px;
      }

      .info-box {
        font-size: 18px;
        padding: 9px 14px;
      }

      #fake-cursor {
        width: 42px;
        height: 42px;
        font-size: 30px;
      }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="guide-modal">
      <h2 id="modal-title">집사 자격 테스트 🐾</h2>

      <label class="field-label" for="player-name">닉네임</label>
      <input id="player-name" type="text" maxlength="10" placeholder="예: 대호" />

      <div id="result-text"></div>

      <ul id="guide-list">
        <li><strong>방법:</strong> 화면에 나타나는 고양이를 클릭하세요.</li>
        <li><strong>시간:</strong> 15초 동안 진행됩니다.</li>
        <li><strong>난이도:</strong> 점수가 오를수록 고양이가 더 빨리 움직입니다.</li>
        <li><strong>랭킹:</strong> 구글 스프레드시트와 연결하면 점수가 자동 저장됩니다.</li>
      </ul>

      <div id="ranking-box">
        <div id="ranking-title">실시간 랭킹</div>
        <ol id="ranking-list"></ol>
        <div class="ranking-note">구글 스프레드시트 웹앱 URL을 넣기 전에는 로컬 미리보기만 됩니다.</div>
      </div>

      <button id="start-btn">테스트 시작!</button>
    </div>

    <div id="ui-layer">
      <div class="info-box">점수: <span id="score-val">0</span></div>
      <div class="info-box">시간: <span id="timer-val">15</span>초</div>
    </div>

    <div id="cat">🐱</div>
  </div>

  <div id="fake-cursor">🖐️</div>

  <script>
    const WEBAPP_URL = 'YOUR_WEBAPP_URL_HERE';

    const cat = document.getElementById('cat');
    const scoreVal = document.getElementById('score-val');
    const timerVal = document.getElementById('timer-val');
    const startBtn = document.getElementById('start-btn');
    const guideModal = document.getElementById('guide-modal');
    const container = document.getElementById('game-container');
    const playerNameInput = document.getElementById('player-name');
    const rankingBox = document.getElementById('ranking-box');
    const rankingList = document.getElementById('ranking-list');
    const resultText = document.getElementById('result-text');
    const modalTitle = document.getElementById('modal-title');
    const fakeCursor = document.getElementById('fake-cursor');

    let score = 0;
    let timeLeft = 15;
    let gameTimeout = null;
    let timerInterval = null;
    let currentDelay = 1200;
    let gameFieldWidth = window.innerWidth;
    let gameFieldHeight = window.innerHeight;
    let isPlaying = false;

    const messages = ['냥!', '골골골!', '집사야 더!', '아이 좋아!', '심쿵!', '🐾', '야옹!', '기분 최고!'];
    const catEmojis = ['🐱', '😸', '😻', '😽', '😺'];

    function sanitizeName(name) {
      const cleaned = String(name || '').replace(/[<>]/g, '').trim();
      return cleaned.slice(0, 10) || '익명';
    }

    function moveFakeCursor(x, y) {
      fakeCursor.style.left = `${x}px`;
      fakeCursor.style.top = `${y}px`;
    }

    document.addEventListener('mousemove', (e) => {
      moveFakeCursor(e.clientX, e.clientY);
    });

    document.addEventListener('mousedown', () => {
      fakeCursor.textContent = '✊';
      fakeCursor.classList.add('grab');
    });

    document.addEventListener('mouseup', () => {
      fakeCursor.textContent = '🖐️';
      fakeCursor.classList.remove('grab');
    });

    document.addEventListener('mouseleave', () => {
      fakeCursor.style.opacity = '0';
    });

    document.addEventListener('mouseenter', () => {
      fakeCursor.style.opacity = '1';
    });

    function moveCat() {
      if (!isPlaying) return;

      const catSize = window.innerWidth <= 540 ? 100 : 120;
      const maxX = Math.max(0, gameFieldWidth - catSize);
      const maxY = Math.max(0, gameFieldHeight - catSize);

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      cat.style.left = `${randomX}px`;
      cat.style.top = `${randomY}px`;
      cat.textContent = catEmojis[Math.floor(Math.random() * catEmojis.length)];

      currentDelay = Math.max(260, 1200 - (score * 45));

      clearTimeout(gameTimeout);
      gameTimeout = setTimeout(moveCat, currentDelay);
    }

    function showMessage(x, y) {
      const msg = document.createElement('div');
      msg.className = 'message';
      msg.textContent = messages[Math.floor(Math.random() * messages.length)];
      msg.style.left = `${x}px`;
      msg.style.top = `${y}px`;
      container.appendChild(msg);
      setTimeout(() => msg.remove(), 800);
    }

    cat.addEventListener('mousedown', (e) => {
      if (!isPlaying) return;
      score += 1;
      scoreVal.textContent = score;
      showMessage(e.clientX, e.clientY);
      moveCat();
    });

    function renderRanking(rankings) {
      rankingList.innerHTML = '';

      if (!Array.isArray(rankings) || rankings.length === 0) {
        const li = document.createElement('li');
        li.textContent = '아직 등록된 기록이 없습니다.';
        rankingList.appendChild(li);
        rankingBox.style.display = 'block';
        return;
      }

      rankings.forEach((item, index) => {
        const li = document.createElement('li');
        const name = sanitizeName(item.name);
        const itemScore = Number(item.score || 0);
        li.textContent = `${index + 1}위 - ${name} : ${itemScore}점`;
        rankingList.appendChild(li);
      });

      rankingBox.style.display = 'block';
    }

    async function loadRanking() {
      if (!WEBAPP_URL || WEBAPP_URL === 'YOUR_WEBAPP_URL_HERE') {
        renderRanking([]);
        return;
      }

      try {
        const res = await fetch(WEBAPP_URL, { method: 'GET' });
        const data = await res.json();
        renderRanking(data.rankings || []);
      } catch (err) {
        console.error('랭킹 불러오기 실패', err);
        renderRanking([]);
      }
    }

    async function submitScore(name, currentScore) {
      if (!WEBAPP_URL || WEBAPP_URL === 'YOUR_WEBAPP_URL_HERE') {
        const localRanking = JSON.parse(localStorage.getItem('cat-ranking-local') || '[]');
        localRanking.push({ name, score: currentScore, savedAt: new Date().toISOString() });
        localRanking.sort((a, b) => b.score - a.score);
        const sliced = localRanking.slice(0, 10);
        localStorage.setItem('cat-ranking-local', JSON.stringify(sliced));
        renderRanking(sliced);
        return;
      }

      try {
        const res = await fetch(WEBAPP_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ name, score: currentScore })
        });

        const data = await res.json();
        renderRanking(data.rankings || []);
      } catch (err) {
        console.error('랭킹 저장 실패', err);
        alert('랭킹 저장에 실패했습니다. Apps Script URL 또는 배포 설정을 확인해주세요.');
      }
    }

    function startGame() {
      gameFieldWidth = window.innerWidth;
      gameFieldHeight = window.innerHeight;
      guideModal.style.display = 'none';

      clearInterval(timerInterval);
      clearTimeout(gameTimeout);

      score = 0;
      timeLeft = 15;
      currentDelay = 1200;
      isPlaying = true;

      scoreVal.textContent = score;
      timerVal.textContent = timeLeft;
      cat.style.display = 'flex';
      moveCat();

      timerInterval = setInterval(() => {
        timeLeft -= 1;
        timerVal.textContent = timeLeft;
        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    async function endGame() {
      clearInterval(timerInterval);
      clearTimeout(gameTimeout);
      isPlaying = false;
      cat.style.display = 'none';
      guideModal.style.display = 'block';

      const playerName = sanitizeName(playerNameInput.value);
      playerNameInput.value = playerName;

      let feedback = '아직 수련이 필요합니다.';
      if (score > 25) feedback = '전설의 고양이 마스터입니다!';
      else if (score > 15) feedback = '훌륭한 집사입니다!';

      modalTitle.textContent = `결과: ${score}점!`;
      resultText.textContent = feedback;
      startBtn.textContent = '다시 도전하기';

      await submitScore(playerName, score);
    }

    startBtn.addEventListener('click', startGame);

    playerNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !isPlaying) {
        startGame();
      }
    });

    loadRanking();
  </script>
</body>
</html>
