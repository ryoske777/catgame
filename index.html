<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고양이 집사 테스트 (Hard) 🐾</title>
    <style>
        :root { --bg-color: #fff9eb; --accent-color: #ff6b6b; --box-bg: rgba(255, 255, 255, 0.95); }
        body { 
            text-align: center; font-family: 'Pretendard', sans-serif; 
            background-color: var(--bg-color); margin: 0; padding: 0;
            overflow: hidden; user-select: none; -webkit-user-select: none;
        }
        
        #game-container { position: relative; width: 100vw; height: 100vh; cursor: crosshair; }
        
        #cat { 
            position: absolute; width: 120px; height: 120px; font-size: 90px; 
            display: none; align-items: center; justify-content: center;
            cursor: pointer; z-index: 10; transition: transform 0.1s active;
        }
        #cat:active { transform: scale(0.8); }

        #ui-layer { 
            position: fixed; top: 20px; width: 100%; pointer-events: none; 
            display: flex; justify-content: center; gap: 30px; z-index: 100;
        }
        .info-box { 
            background: var(--box-bg); padding: 10px 20px; 
            border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            font-size: 20px; font-weight: bold; color: #444;
        }

        /* 게임 방법 설명창 */
        #guide-modal {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: var(--box-bg); padding: 30px; border-radius: 25px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.15); z-index: 1000;
            width: 320px; border: 3px solid #ffcc00;
        }
        #guide-modal h2 { margin-top: 0; color: #d35400; }
        #guide-modal ul { text-align: left; padding-left: 20px; color: #555; line-height: 1.8; }
        #guide-modal li { margin-bottom: 8px; }

        .message {
            position: absolute; color: var(--accent-color); font-weight: bold; 
            font-size: 1.2rem; pointer-events: none;
            animation: fadeUp 0.8s ease-out forwards; z-index: 20;
        }
        @keyframes fadeUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-60px); }
        }

        #start-btn {
            width: 100%; padding: 15px; font-size: 1.4rem; background: #ffcc00; 
            border: none; border-radius: 15px; cursor: pointer;
            margin-top: 20px; font-weight: bold; transition: 0.2s;
        }
        #start-btn:hover { background: #ffb300; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="guide-modal">
        <h2>집사 자격 테스트 🐾</h2>
        <ul>
            <li><strong>방법:</strong> 화면에 나타나는 고양이를 클릭하세요!</li>
            <li><strong>시간:</strong> 딱 15초 동안 진행됩니다.</li>
            <li><strong>난이도:</strong> 점수가 오를수록 고양이가 더 빨리 도망갑니다.</li>
            <li><strong>주의:</strong> 게임 시작 시점의 창 크기로 영역이 고정됩니다. 창을 줄이면 고양이가 안 보일 수 있어요!</li>
        </ul>
        <button id="start-btn">테스트 시작!</button>
    </div>
    
    <div id="ui-layer">
        <div class="info-box">점수: <span id="score-val">0</span></div>
        <div class="info-box">시간: <span id="timer-val">15</span>초</div>
    </div>

    <div id="cat">🐱</div>
</div>

<script>
    const cat = document.getElementById('cat');
    const scoreVal = document.getElementById('score-val');
    const timerVal = document.getElementById('timer-val');
    const startBtn = document.getElementById('start-btn');
    const guideModal = document.getElementById('guide-modal');
    const container = document.getElementById('game-container');

    let score = 0;
    let timeLeft = 15;
    let gameTimeout;
    let timerInterval;
    let currentDelay = 1200;
    let gameFieldWidth = window.innerWidth;
    let gameFieldHeight = window.innerHeight;

    const messages = ["냥!", "골골골~", "집사야 더!", "아이 좋아!", "심쿵!", "🐾", "야옹~", "기분 최고!"];
    const catEmojis = ["🐱", "😸", "😻", "😽", "😺"];

    function moveCat() {
        const catSize = 120;
        const maxX = gameFieldWidth - catSize;
        const maxY = gameFieldHeight - catSize;
        
        const randomX = Math.random() * maxX;
        const randomY = Math.random() * maxY;
        
        cat.style.left = `${randomX}px`;
        cat.style.top = `${randomY}px`;
        cat.innerText = catEmojis[Math.floor(Math.random() * catEmojis.length)];

        currentDelay = Math.max(300, 1200 - (score * 45)); // 약간 더 가파르게 난이도 상승
        
        clearTimeout(gameTimeout);
        gameTimeout = setTimeout(moveCat, currentDelay);
    }

    function showMessage(x, y) {
        const msg = document.createElement('div');
        msg.className = 'message';
        msg.innerText = messages[Math.floor(Math.random() * messages.length)];
        msg.style.left = `${x}px`;
        msg.style.top = `${y}px`;
        container.appendChild(msg);
        setTimeout(() => msg.remove(), 800);
    }

    cat.addEventListener('mousedown', (e) => {
        score++;
        scoreVal.innerText = score;
        showMessage(e.clientX, e.clientY);
        moveCat();
    });

    function startGame() {
        // 게임 영역 박제 및 UI 전환
        gameFieldWidth = window.innerWidth;
        gameFieldHeight = window.innerHeight;
        guideModal.style.display = 'none';
        
        score = 0;
        timeLeft = 15;
        currentDelay = 1200;
        scoreVal.innerText = score;
        timerVal.innerText = timeLeft;
        cat.style.display = 'flex';
        moveCat();

        timerInterval = setInterval(() => {
            timeLeft--;
            timerVal.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);
    }

    function endGame() {
        clearInterval(timerInterval);
        clearTimeout(gameTimeout);
        cat.style.display = 'none';
        guideModal.style.display = 'block'; // 게임 끝나면 다시 가이드(결과) 창 표시
        
        let feedback = score > 25 ? "전설의 고양이 마스터!" : score > 15 ? "훌륭한 집사군요!" : "아직 수련이 필요합니다.";
        
        // 가이드 타이틀을 결과로 변경
        guideModal.querySelector('h2').innerText = `결과: ${score}점!`;
        startBtn.innerText = "다시 도전하기";
    }

    startBtn.addEventListener('click', startGame);
</script>

</body>
</html>
